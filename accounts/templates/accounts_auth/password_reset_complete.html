{% extends "base.html" %}
{% load static %}

{% block title %}Success - Note Share{% endblock %}

{% block content %}
<style>
    /* ===============================
       SUCCESS PAGE STYLING (NO SCROLL)
    =================================*/
    :root {
        --primary-grad: linear-gradient(135deg, #d8cd2f 0%, #ff791a 100%);
        --success-green: #28a745;
    }

    html, body {
        block-size: 100%;
        margin: 0;
        overflow: hidden;
    }

    .auth-wrapper {
        block-size: 100vh;
        inline-size: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fbff;
        position: relative;
        overflow: hidden;
    }

    /* Floating Shapes */
    .shape {
        position: absolute;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.3;
        border-radius: 50%;
    }
    .shape-1 {
        inline-size: 300px; block-size: 300px;
        background: #d8cd2f;
        inset-block-start: -100px; inset-inline-start: -100px;
    }
    .shape-2 {
        inline-size: 400px; block-size: 400px;
        background: #ff791a;
        inset-block-end: -150px; inset-inline-end: -150px;
    }

    /* --- SUCCESS CARD --- */
    .card-box {
        inline-size: 90%;
        max-inline-size: 420px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 30px;
        padding: 40px;
        position: relative;
        z-index: 10;
        box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        text-align: center;
        animation: cardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes cardPop {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Success Icon Animation */
    .success-icon-box {
        inline-size: 80px;
        block-size: 80px;
        background: rgba(40, 167, 69, 0.1);
        color: var(--success-green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 20px;
        animation: iconBounce 1s ease infinite alternate;
    }

    @keyframes iconBounce {
        from { transform: translateY(0); }
        to { transform: translateY(-10px); }
    }

    .title { font-weight: 800; color: #1a1a1a; margin-block-end: 10px; }
    .overview { color: #6c757d; font-size: 0.95rem; margin-block-end: 30px; line-height: 1.5; }

    .btn-gradient {
        background: var(--primary-grad);
        border: none;
        padding: 14px;
        border-radius: 15px;
        color: white !important;
        font-weight: 700;
        display: block;
        inline-size: 100%;
        text-decoration: none;
        transition: 0.4s;
        box-shadow: 0 10px 20px rgba(255, 121, 26, 0.3);
    }

    .btn-gradient:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(255, 121, 26, 0.4);
    }

    /* ================= RESPONSIVE MASTER CODE ================= */

/* 1. TABLET (iPad/Large Phones) - Jab screen 992px se choti ho */
@media (max-width: 992px) {
    .container { inline-size: 95%; } 
    .brand-text { font-size: 1.4rem; }
    .card-box { inline-size: 85%; padding: 25px; }
}

/* 2. MOBILE (Standard Phones) - Jab screen 768px se choti ho */
@media (max-width: 768px) {
    body { font-size: 14px; }
    .brand-text { font-size: 1.2rem; }
    .card-box { inline-size: 92%; padding: 20px; border-radius: 20px; }
    .nav-link-modern { padding: 6px 10px !important; font-size: 0.8rem; }
}

/* 3. TV & LARGE SCREENS - Content ko bahut phailne se bachata hai */
@media (min-width: 1400px) {
    .container { max-inline-size: 1200px; margin: 0 auto; }
}

/* HAR SCREEN KE LIYE SAFETY - Cheezein screen se bahar na bhagein */
img, video, canvas, svg {
    max-inline-size: 100%;
    block-size: auto;
}

</style>

<div class="auth-wrapper">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="card-box">
        <div class="success-icon-box">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <h3 class="title">Success!</h3>
        <p class="overview">
            Your password has been successfully updated. <br>
            You can now continue your journey with your new credentials.
        </p>

        <a href="{% url 'login' %}" class="btn-gradient">
            <i class="bi bi-box-arrow-in-right me-2"></i> Go to Login
        </a>
    </div>
</div>

<script>
    document.body.style.overflow = "hidden";
</script>
{% endblock %}
